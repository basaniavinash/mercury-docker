server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_image]
        target_label: image

    pipeline_stages:
      # 1) decode Docker's json log envelope (gives you "log", "time", "stream")
      - docker: {}

      # 2) parse YOUR application log line (which is JSON) from the "log" field
      - json:
          source: log
          expressions:
            timestamp: '["@timestamp"]'
            level: level
            logger: logger_name
            message: message
            service: service
            env: env
            thread: thread_name
            stack_trace: stack_trace
            requestId: requestId

      # 3) Promote useful fields into Loki labels (keep these LOW cardinality)
      - labels:
          service:
          env:
          level:
          container:

      # 4) Tell Loki what the real log message is
      - output:
          source: message

      # (Optional) Use your own timestamp from the log
      - timestamp:
          source: timestamp
          format: RFC3339Nano
