worker_processes 1;

#how nginx talks the kernel. defines how nginx workers sleep, wake and accept sockers from the kernel
events { worker_connections 1024; }

http {
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    upstream catalog{
        server mercury-catalog-service:8080;
    }

    upstream orders{
        server mercury-order-service:8080;
    }

    server {
        listen 80;
        server_name _;

        location /catalog/{
            proxy_pass http://catalog/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /catalog {
            return 301 /catalog/;
        }

        location /orders/ {
            proxy_pass http://orders/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /orders {
            return 301 /orders/;
        }

        location / {
            return 404 "Use /catalog/* or /orders/*";
        }
    }
}