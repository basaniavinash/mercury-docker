worker_processes 1;

#how nginx talks to the kernel. defines how nginx workers sleep, wake and accept sockers from the kernel
events { worker_connections 1024; }

http {
    #Docker embedded dns
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 1) Where the cache lives + how it is organized
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=catalog_cache:50m
        max_size=5g
        inactive=30m
        use_temp_path=off;

    upstream catalog{
        server mercury-catalog-service:8080;
    }

    upstream orders{
        server mercury-order-service:8080;
    }

    upstream payments{
        server mercury-payment-service:8080;
    }

    server {
        listen 80;
        server_name api.mercury.local;

        # Debug header so you can see HIT/MISS/BYPASS/STALE in curl
        add_header X-Cache-Status $upstream_cache_status always;


        #these can be shared or passed individually in location contexts
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache ONLY catalog item reads
        location ^~ /catalog/api/v1/items {
            proxy_pass http://catalog/;

            # 2) Enable cache for this location
            proxy_cache catalog_cache;
            # 3) Define the cache key ("what counts as same request")
            proxy_cache_key "$scheme$host$request_uri";

            # 4) Define validity if upstream doesn't give caching headers
            proxy_cache_valid 200 10s;
            proxy_cache_valid 404 2s;

            # 5) Avoid stampedes: only one request populates cache on MISS
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            proxy_cache_lock_age 10s;

            # 6) If upstream is slow/down, serve stale instead of failing fast
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;

            add_header X-Cache-Status $upstream_cache_status always;

            # Don’t ever cache authenticated traffic
            proxy_no_cache $http_authorization;
            proxy_cache_bypass $http_authorization;

            # Optional: ignore upstream's cache headers if you want full control
            # proxy_ignore_headers Cache-Control Expires;

            proxy_connect_timeout 1s;
            proxy_send_timeout 7s;
            proxy_read_timeout 7s;
        }

        location /catalog/{
            proxy_pass http://catalog/;

            proxy_connect_timeout 1s; #time to establish TCP to upstream (or TLS handshake if HTTPS upstream).
            proxy_send_timeout 7s; #ime allowed for Nginx to send the request to the upstream (relevant if upstream is slow to read / backpressured)
            proxy_read_timeout 7s; #time Nginx waits between reads from upstream response (this is the usual “upstream took too long” timeout).

            # proxy_set_header Host $host;
            # proxy_set_header X-Real-IP $remote_addr;
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /catalog {
            return 301 /catalog/;
        }

        location /orders/ {
            proxy_pass http://orders/;

            proxy_connect_timeout 3s;
            proxy_send_timeout 8s;
            proxy_read_timeout 10s;

            # proxy_set_header Host $host;
            # proxy_set_header X-Real-IP $remote_addr;
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /orders {
            return 301 /orders/;
        }

        location = /payments/{
            proxy_pass http://payments/;

            proxy_connect_timeout 3s;
            proxy_send_timeout 8s;
            proxy_read_timeout 5s;

        }

        location /payments{
            return 301 /payments/;
        }

        location / {
            return 404 "Use /catalog/* or /orders/*";
        }
    }

    server{
        listen 80;
        server_name auth.mercury.local;

        location / {
            proxy_pass http://keycloak:8080;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
        }
    }

    server {
        listen 80;
        server_name grafana.mercury.local;

        location / {
            proxy_pass http://grafana:3000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
        }
    }

    server {
        listen 80;
        server_name prom.mercury.local;

        location / {
            proxy_pass http://prometheus:9090;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
        }
    }
}